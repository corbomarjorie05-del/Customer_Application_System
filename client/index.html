<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Application System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <h1><i class="fas fa-file-alt"></i> AppPortal</h1>
            <nav id="nav">
                <button id="logoutBtn" style="display: none;">Logout</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Auth Section -->
        <section id="authSection" class="card">
            <div class="tabs">
                <button id="loginTab" class="active">Login</button>
                <button id="registerTab">Register</button>
            </div>
            <form id="authForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div id="registerFields" style="display: none;">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="firstName">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" id="submitBtn">Login</button>
            </form>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboardSection" style="display: none;">
            <div class="card">
                <h2>Welcome, <span id="userName">User</span>!</h2>
                <div class="stats">
                    <div class="stat-item">
                        <i class="fas fa-paper-plane"></i>
                        <span id="appCount">0</span> Applications
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Submit New Application</h3>
                <form id="appForm">
                    <div class="form-group">
                        <label>Application Type</label>
                        <select id="appType">
                            <option value="Credit Card">Credit Card</option>
                            <option value="Personal Loan">Personal Loan</option>
                            <option value="Mortgage">Mortgage</option>
                            <option value="Business Loan">Business Loan</option>
                            <option value="Auto Loan">Auto Loan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Amount Requested ($)</label>
                        <input type="number" id="appAmount" placeholder="e.g. 5000" min="0">
                    </div>
                    <div class="form-group" id="statusGroup" style="display: none;">
                        <label>Status</label>
                        <select id="appStatus">
                            <option value="pending">Pending</option>
                            <option value="approved">Approved</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Details</label>
                        <textarea id="appDetails" placeholder="Provide any additional details..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="appSubmitBtn">Submit Application</button>
                        <button type="button" id="cancelEditBtn" style="display: none;">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="card">
                <h3>Your Applications</h3>
                <div id="appList" class="list">
                    <!-- Applications will be loaded here -->
                </div>
            </div>
        </section>
    </main>

    <script src="js/api.js" type="module"></script>
    <script src="js/app.js" type="module"></script>
</body>
</html>
